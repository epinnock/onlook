  #     - uses: oven-sh/setup-bun@v1
  #       with:
  #         bun-version: 1.3.1
  #     - name: Cache dependencies
  #       uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.bun/install/cache
  #         key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}

  #     - name: Install dependencies

name: mobile-client

# CI for the @onlook/mobile-client workspace and @onlook/mobile-client-protocol
# shared package. Phase F task MCF10 of plans/onlook-mobile-client-task-queue.md.
#
# The job slots below are pre-declared so Wave tasks can fill them via
# append-only edits to THIS file — no other task touches this workflow.
# A slot is "empty" until the wave it belongs to has a runnable validate.
# Slots gated on native tooling (iOS simulator, Android emulator, TestFlight)
# use `if:` guards that check for the presence of the generated project trees
# (apps/mobile-client/ios/, apps/mobile-client/android/) so MCF10 can land
# BEFORE MCF8 without the workflow erroring on missing directories.

on:
  push:
    branches:
      - feat/mobile-client
      - main
    paths:
      - 'apps/mobile-client/**'
      - 'packages/mobile-client-protocol/**'
      - 'packages/mobile-preview/runtime/**'
      - 'plans/onlook-mobile-client-task-queue.md'
      - '.github/workflows/mobile-client.yml'
  pull_request:
    branches:
      - feat/mobile-client
      - main
    paths:
      - 'apps/mobile-client/**'
      - 'packages/mobile-client-protocol/**'
      - 'packages/mobile-preview/runtime/**'
  # workflow_dispatch lets the task-queue Validate lines invoke a specific
  # phase explicitly, e.g.:
  #   gh workflow run mobile-client.yml -f phase=wave1-ios
  # Leaving `phase` empty runs everything whose `if:` guard is satisfied,
  # matching the default push/pull_request behaviour.
  workflow_dispatch:
    inputs:
      phase:
        description: 'Limit run to a single phase (wave1-ios, wave1-android, wave3, wave4-ios, wave5, testflight-dryrun, testflight-upload, play-dryrun, play-store-upload) or leave blank for all.'
        required: false
        default: ''
        type: string
      upload:
        description: 'When true, the testflight-upload / play-store-upload jobs perform a real EAS build + submit. When false (default), those jobs run in --dry-run mode only. Gated additionally on per-platform secrets (EXPO_TOKEN for iOS, GOOGLE_PLAY_SERVICE_ACCOUNT_KEY for Android); without the relevant secret the job is skipped regardless of this input.'
        required: false
        default: false
        type: boolean

concurrency:
  group: mobile-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── guard: cheap file-existence probes to gate downstream jobs ──────────
  #
  # GitHub Actions does NOT permit `hashFiles()` inside job-level `if:`
  # expressions — it's only available in step-level `if:` and `with:`
  # contexts. Calling it at job level fails workflow validation (HTTP 422
  # "Unrecognized function: 'hashFiles'") and aborts the entire run before
  # any job starts. The previous shape of this workflow had hashFiles() in
  # six job-level if's; every push triggered a 0-second failure with no jobs.
  #
  # Fix: this guard job runs first on a tiny ubuntu runner, computes the
  # presence of each gating file via `hashFiles()` at the STEP level (where
  # it is permitted), and exposes a boolean string output. Downstream jobs
  # gate themselves on `needs.guard.outputs.<flag> == 'true'` — a plain
  # string comparison that is allowed at the job level.
  guard:
    name: Guard — file + secret probes
    runs-on: ubuntu-latest
    outputs:
      has_ios_workspace: ${{ steps.probe.outputs.has_ios_workspace }}
      has_inspector_swift: ${{ steps.probe.outputs.has_inspector_swift }}
      has_android_build: ${{ steps.probe.outputs.has_android_build }}
      has_eas_json: ${{ steps.probe.outputs.has_eas_json }}
      has_play_internal_script: ${{ steps.probe.outputs.has_play_internal_script }}
      has_expo_token: ${{ steps.probe.outputs.has_expo_token }}
      has_google_play_key: ${{ steps.probe.outputs.has_google_play_key }}
    steps:
      - uses: actions/checkout@v4
      - id: probe
        env:
          EXPO_TOKEN_PRESENT: ${{ secrets.EXPO_TOKEN != '' && 'true' || 'false' }}
          GOOGLE_PLAY_KEY_PRESENT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY != '' && 'true' || 'false' }}
        run: |
          set -e
          ios_workspace=$([ -n "${{ hashFiles('apps/mobile-client/ios/**/OnlookMobileClient.xcworkspace/**') }}" ] && echo true || echo false)
          inspector_swift=$([ -n "${{ hashFiles('apps/mobile-client/ios/**/OnlookInspector.swift') }}" ] && echo true || echo false)
          android_build=$([ -n "${{ hashFiles('apps/mobile-client/android/**/build.gradle') }}" ] && echo true || echo false)
          eas_json=$([ -n "${{ hashFiles('apps/mobile-client/eas.json') }}" ] && echo true || echo false)
          play_internal_script=$([ -n "${{ hashFiles('apps/mobile-client/scripts/build-play-internal.sh') }}" ] && echo true || echo false)
          {
            echo "has_ios_workspace=${ios_workspace}"
            echo "has_inspector_swift=${inspector_swift}"
            echo "has_android_build=${android_build}"
            echo "has_eas_json=${eas_json}"
            echo "has_play_internal_script=${play_internal_script}"
            echo "has_expo_token=${EXPO_TOKEN_PRESENT}"
            echo "has_google_play_key=${GOOGLE_PLAY_KEY_PRESENT}"
          } | tee -a "$GITHUB_OUTPUT"

  # ─── always-on: type + unit tests for the tool-free Phase F work ────────

  typecheck-and-unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Typecheck mobile-client-protocol
        run: bun --filter @onlook/mobile-client-protocol typecheck
      - name: Typecheck mobile-client
        run: bun --filter @onlook/mobile-client typecheck
      - name: Unit tests — mobile-client-protocol
        run: bun test packages/mobile-client-protocol/src
      - name: Unit tests — mobile-client scripts
        run: cd apps/mobile-client && bun run test
      - name: Smoke — validate-task harness parses real queue entries
        run: bun run apps/mobile-client/scripts/validate-task.ts MCF0 --dry-run
      - name: MCI.3 — bundle size audit (hello-onlook, gate ≤ 20 KB)
        run: cd apps/mobile-client && bun run mobile:audit:bundle-size

  # ─── Wave 1: iOS simulator build + boot flow ────────────────────────────

  wave1-ios:
    name: Wave 1 — iOS simulator build
    # macos-15 + latest-stable Xcode 16.x is required: RN 0.81.6's Podfile
    # explicitly fails CocoaPods install with "React Native requires
    # XCode >= 16.1" when run on macos-14 (Xcode 15.4). The local Mac mini
    # already validated this stack on Xcode 16.4 + iOS 18.6 (per CLAUDE.md
    # "Two-tier overlay v2 / mobile-client architecture" §"Bridgeless iOS
    # 18.6 gotchas"), so the runner is now lined up with that.
    #
    # The simulator detection step below picks the first available iPhone
    # simulator regardless of iOS version (was previously filtered to iOS
    # 17). The validate-mc*.sh scripts use `xcrun simctl install booted`
    # so they're version-agnostic; whichever sim macos-15 ships will work.
    #
    # The wrapper script `mobile:build:ios` uses
    # `generic/platform=iOS Simulator` so it does NOT bake an iPhone model
    # name into the build destination.
    runs-on: macos-15
    needs: [guard, typecheck-and-unit]
    # Gate twofold:
    #   (a) Only run once MCF8 has committed the ios/ project tree
    #       (probed by the `guard` job; hashFiles is not permitted at
    #       job-level `if:`).
    #   (b) When dispatched with a specific `phase` input, skip unless
    #       the caller asked for this phase (empty phase == run all).
    if: >-
      ${{ needs.guard.outputs.has_ios_workspace == 'true'
          && (github.event_name != 'workflow_dispatch'
              || inputs.phase == ''
              || inputs.phase == 'wave1-ios') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          # Use whatever Xcode the macos-15 runner ships pre-installed
          # (typically 16.x). RN 0.81.6's Podfile gates on Xcode ≥ 16.1.
          xcode-version: 'latest-stable'
      - name: Install native tooling
        # cocoapods: required by expo prebuild iOS pods.
        # openjdk@17: not used by this job, but installed so the same
        #   runner image is a drop-in for wave1-android (keeps the cache
        #   warm for concurrent jobs and mirrors the MC1.12 setup). Costs
        #   ~5s via brew.
        # maestro: installed for future wave-2+ flows that become viable
        #   once a renderable user bundle lands. The current log-scrape
        #   validates do not call maestro, but the binary is needed for
        #   any `bun run mobile:e2e:ios` invocation a later Wave pipes in.
        # xcodeproj gem: brew-installed ruby + `gem install xcodeproj`
        #   is the pattern for programmatic pbxproj edits. Not required
        #   by this job — we build via `mobile:build:ios` which doesn't
        #   mutate the pbxproj — but documented here for later waves.
        # maestro's tap downloads a tarball from S3 / GitHub which has been
        # observed to flake on transient 5xx + DNS hiccups (caught Wave 5
        # green for 5 consecutive runs then bombed: "Failed to download
        # resource maestro (2.4.0)"). Retry the brew installs up to 3x with
        # exponential backoff — they're idempotent (`brew install` is a
        # no-op once the formula is present) so re-running is safe.
        run: |
          retry() {
            local n=0; local max=3; local delay=5
            until "$@"; do
              n=$((n+1))
              if [ "$n" -ge "$max" ]; then
                echo "::error::brew install failed after $max attempts: $*"
                return 1
              fi
              echo "::warning::brew install attempt $n failed; retrying in ${delay}s — $*"
              sleep "$delay"
              delay=$((delay*2))
            done
          }
          retry brew install cocoapods openjdk@17
          retry brew install mobile-dev-inc/tap/maestro
          # gem install xcodeproj   # unblock pbxproj edits if a future wave needs it
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Build onlook-runtime bundles
        # Produces both packages/mobile-preview/runtime/bundle.js (full,
        # ~258 KB, used by Expo Go / mobile-preview harness) AND
        # bundle-client-only.js (slim, ~9 KB, shell.js only — used by the
        # native mobile-client). Mobile-client's scripts/bundle-runtime.ts
        # copies the slim variant into ios/Resources at build time, so
        # mobile:build:ios fails with "source bundle not found" if only
        # the full bundle is built. See CLAUDE.md "Mobile-client bundle
        # split" for the rationale.
        run: |
          bun run build:mobile-runtime
          bun --filter @onlook/mobile-preview build:runtime:client-only
      - name: CocoaPods install
        run: cd apps/mobile-client/ios && pod install
      - name: Build iOS .app for simulator
        # `bun run mobile:build:ios` wraps:
        #   1. bundle-runtime.ts (copy runtime asset into ios/Resources)
        #   2. expo export:embed (bake main.jsbundle)
        #   3. xcodebuild with `-destination generic/platform=iOS Simulator`
        # This replaces the original hand-rolled xcodebuild invocation
        # which used `-destination generic/platform=iOS Simulator`
        # — the wrapper's generic destination sidesteps the iPhone-name
        # drift each Xcode bump introduces.
        run: bun run mobile:build:ios
      # The log-scrape validates below boot the built .app on a simulator
      # and scrape the device log for marker lines. They're the Validate
      # commands that MC1.4 and MC2.3 canonicalised (each task queue entry
      # points at its own bespoke script). Add new `validate-mc*.sh` lines
      # here as wave-2 tasks ship them — explicit names are safer than a
      # glob because a failure in one script should fail the whole job.
      #
      # TODO: extend with validate-mc24.sh / validate-mc25.sh / … when the
      # remaining wave-2 tasks (MC2.4, MC2.5, MC2.11, MC2.12) land their
      # bespoke log-scrape scripts.
      - name: Boot iOS Simulator
        # The validate-mc*.sh scripts need a *booted* simulator for
        # `xcrun simctl install booted`. Pick the first available
        # iPhone simulator the runner has and boot it (whatever iOS
        # version macos-15 ships).
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | awk '/-- iOS /{flag=$0} /iPhone/ && !seen {print; seen=1}' \
            | head -1 \
            | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
          if [ -z "$DEVICE" ]; then
            echo 'FAIL: no iPhone simulator available on this runner'
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
      - name: Validate MC1.4 — HermesBootstrap log-scrape
        run: bash apps/mobile-client/scripts/validate-mc14.sh
      - name: Validate MC2.3 — OnlookRuntime installer log-scrape
        run: bash apps/mobile-client/scripts/validate-mc23.sh
      - name: Upload wave-1 iOS verification artifacts
        # Always upload even on failure so the log-scrape tails are
        # inspectable post-mortem. `maestro-debug/` is present once any
        # maestro-based validate runs (future waves); it's included via
        # `if-no-files-found: ignore` so its absence doesn't fail here.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave1-ios-verification
          path: |
            apps/mobile-client/verification/results.json
            apps/mobile-client/verification/maestro-debug/
            apps/mobile-client/e2e/flows/*.png
          if-no-files-found: ignore

  # ─── Wave 1: Android emulator build ─────────────────────────────────────

  wave1-android:
    name: Wave 1 — Android emulator build
    runs-on: macos-15
    needs: [guard, typecheck-and-unit]
    if: ${{ needs.guard.outputs.has_android_build == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Bake runtime asset
        run: cd apps/mobile-client && bun run bundle-runtime
      - name: Assemble debug APK
        run: cd apps/mobile-client/android && ./gradlew assembleDebug

  # ─── Wave 3: relay client + QR onboarding e2e ───────────────────────────

  wave3:
    name: Wave 3 — relay + QR e2e
    runs-on: macos-15
    needs: [guard, wave1-ios]
    if: ${{ needs.guard.outputs.has_ios_workspace == 'true' }}
    steps:
      - run: echo "Wave 3 job slot — filled by MC3.22 append"

  # ─── Wave 4: OnlookInspector tap-to-cursor flow ─────────────────────────

  wave4-ios:
    name: Wave 4 — inspector tap-to-cursor (iOS)
    # macos-15 + latest-stable Xcode 16.x: same as `wave1-ios`/`wave5` so
    # all iOS jobs share one runner image. Xcode 16.1+ is required by RN
    # 0.81.6's Podfile.
    runs-on: macos-15
    # Intentionally NOT `needs: [wave1-ios]`. Mirror the wave5 rationale: each
    # Wave 4 `validate-mc4*.sh` script boots its own simulator and reinstalls
    # the .app, so running on a dedicated runner in parallel with wave1-ios
    # produces the inspector-specific `verification/results.json` artifact
    # even when wave1-ios is skipped or fails early (e.g., when dispatched
    # with `inputs.phase == 'wave4-ios'`).
    needs: [guard, typecheck-and-unit]
    # Gate twofold:
    #   (a) Only run once MC4.1 has committed OnlookInspector.swift into the
    #       ios/ project tree (probed by the `guard` job — hashFiles is not
    #       permitted at job-level `if:`). Until then the slot is skipped.
    #   (b) When dispatched with a specific `phase` input, skip unless the
    #       caller asked for this phase (empty phase == run all).
    if: >-
      ${{ needs.guard.outputs.has_inspector_swift == 'true'
          && (github.event_name != 'workflow_dispatch'
              || inputs.phase == ''
              || inputs.phase == 'wave4-ios') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - name: Install native tooling
        # Mirror wave1-ios / wave5 tooling footprint. cocoapods is required
        # by `pod install`. maestro is installed for future Wave 4 flows
        # that become maestro-runnable (e.g., a `27-tap-to-editor.yaml`
        # flow once MC4.6 lands native tap capture); the current
        # validate-mc4*.sh scripts are pure log-scrape and do not invoke
        # maestro.
        # See wave1-ios for the retry rationale — same flaky-tap risk on
        # mobile-dev-inc/tap/maestro tarball download, same idempotent
        # safety on retry.
        run: |
          retry() {
            local n=0; local max=3; local delay=5
            until "$@"; do
              n=$((n+1))
              if [ "$n" -ge "$max" ]; then
                echo "::error::brew install failed after $max attempts: $*"
                return 1
              fi
              echo "::warning::brew install attempt $n failed; retrying in ${delay}s — $*"
              sleep "$delay"
              delay=$((delay*2))
            done
          }
          retry brew install cocoapods
          retry brew install mobile-dev-inc/tap/maestro
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Build onlook-runtime bundles
        # Produces both packages/mobile-preview/runtime/bundle.js (full,
        # ~258 KB, used by Expo Go / mobile-preview harness) AND
        # bundle-client-only.js (slim, ~9 KB, shell.js only — used by the
        # native mobile-client). Mobile-client's scripts/bundle-runtime.ts
        # copies the slim variant into ios/Resources at build time, so
        # mobile:build:ios fails with "source bundle not found" if only
        # the full bundle is built. See CLAUDE.md "Mobile-client bundle
        # split" for the rationale.
        run: |
          bun run build:mobile-runtime
          bun --filter @onlook/mobile-preview build:runtime:client-only
      - name: CocoaPods install
        run: cd apps/mobile-client/ios && pod install
      - name: Build iOS .app for simulator
        # Same wrapper as wave1-ios / wave5. Each validate-mc4*.sh
        # internally calls `bun run mobile:build:ios` and `xcrun simctl
        # install booted`, so the build here primarily warms DerivedData;
        # the scripts are idempotent if DerivedData already has a fresh
        # build.
        run: bun run mobile:build:ios
      - name: Boot iOS Simulator
        # The validate-mc4*.sh scripts need a booted simulator for
        # `xcrun simctl install booted` and `xcrun simctl spawn booted
        # log stream`. Pick the first available iPhone simulator
        # (whatever iOS version macos-15 ships).
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | awk '/-- iOS /{flag=$0} /iPhone/ && !seen {print; seen=1}' \
            | head -1 \
            | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
          if [ -z "$DEVICE" ]; then
            echo 'FAIL: no iPhone simulator available on this runner'
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
      - name: Run inspector validates (validate-mc4*.sh)
        # Iterate every `validate-mc4*.sh` script present in
        # apps/mobile-client/scripts/. As Wave 4 inspector tasks
        # (MC4.1 OnlookInspector swift shim, MC4.6 tap capture,
        # MC4.13 walkTree, etc.) land their own log-scrape scripts in
        # this dir, they'll be picked up automatically — no workflow
        # edit required. Mirrors the loop pattern MC5.18 established
        # for the wave5 `validate-mc*.sh` debug-surface scripts.
        #
        # `set -e` on the shell + `nullglob` means:
        #   - empty glob => explicit FAIL (so an accidentally-empty
        #     directory can't silently produce a green CI run);
        #   - first failing script fails the step immediately.
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          scripts=(apps/mobile-client/scripts/validate-mc4*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo '[wave4-ios] FAIL: no validate-mc4*.sh scripts found'
            exit 1
          fi
          echo "[wave4-ios] running ${#scripts[@]} inspector validate(s):"
          printf '  - %s\n' "${scripts[@]}"
          for script in "${scripts[@]}"; do
            echo "::group::$script"
            bash "$script"
            echo '::endgroup::'
          done
      - name: Upload wave-4 iOS verification artifacts
        # Always upload even on failure so the log-scrape tails and any
        # maestro-debug dumps are inspectable post-mortem.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave4-ios-verification
          path: |
            apps/mobile-client/verification/results.json
            apps/mobile-client/verification/maestro-debug/
            apps/mobile-client/e2e/flows/*.png
          if-no-files-found: ignore

  # ─── Wave 5: debug surface flows ────────────────────────────────────────

  wave5:
    name: Wave 5 — debug surface
    # macos-15 + latest-stable Xcode 16.x: same as `wave1-ios` so all iOS
    # jobs share one runner image. Xcode 16.1+ is required by RN 0.81.6's
    # Podfile.
    runs-on: macos-15
    # Intentionally NOT `needs: [wave1-ios]`. The Wave 5 debug-surface
    # validates (log-scrape scripts — today: MC1.4 hermes-ready + MC2.3
    # OnlookRuntime installed; tomorrow: MC5.8 crash overlay, MC5.10 dev
    # menu long-press, etc.) boot their own simulator and reinstall the
    # .app themselves, so we can run them on a dedicated runner in parallel
    # with wave1-ios. This also de-couples us from MC1.11's scheduling:
    # if wave1-ios fails for an unrelated reason (e.g., maestro brew
    # hiccup), the Wave 5 debug-surface pass still runs and produces its
    # own `verification/results.json` artifact.
    needs: [guard, typecheck-and-unit]
    if: >-
      ${{ needs.guard.outputs.has_ios_workspace == 'true'
          && (github.event_name != 'workflow_dispatch'
              || inputs.phase == ''
              || inputs.phase == 'wave5') }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - name: Install native tooling
        # Mirror wave1-ios tooling footprint. cocoapods is required by
        # `pod install`. maestro is installed for future Wave 5 flows that
        # become maestro-runnable once a renderable user bundle lands; the
        # current validate-mc*.sh scripts are pure log-scrape and do not
        # invoke maestro.
        # See wave1-ios for the retry rationale — same flaky-tap risk on
        # mobile-dev-inc/tap/maestro tarball download, same idempotent
        # safety on retry.
        run: |
          retry() {
            local n=0; local max=3; local delay=5
            until "$@"; do
              n=$((n+1))
              if [ "$n" -ge "$max" ]; then
                echo "::error::brew install failed after $max attempts: $*"
                return 1
              fi
              echo "::warning::brew install attempt $n failed; retrying in ${delay}s — $*"
              sleep "$delay"
              delay=$((delay*2))
            done
          }
          retry brew install cocoapods
          retry brew install mobile-dev-inc/tap/maestro
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Build onlook-runtime bundles
        # Produces both packages/mobile-preview/runtime/bundle.js (full,
        # ~258 KB, used by Expo Go / mobile-preview harness) AND
        # bundle-client-only.js (slim, ~9 KB, shell.js only — used by the
        # native mobile-client). Mobile-client's scripts/bundle-runtime.ts
        # copies the slim variant into ios/Resources at build time, so
        # mobile:build:ios fails with "source bundle not found" if only
        # the full bundle is built. See CLAUDE.md "Mobile-client bundle
        # split" for the rationale.
        run: |
          bun run build:mobile-runtime
          bun --filter @onlook/mobile-preview build:runtime:client-only
      - name: CocoaPods install
        run: cd apps/mobile-client/ios && pod install
      - name: Build iOS .app for simulator
        # Same wrapper as wave1-ios. Each validate-mc*.sh internally calls
        # `bun run mobile:build:ios` and `xcrun simctl install booted` so
        # the build here primarily warms DerivedData; the scripts are
        # idempotent if DerivedData already has a fresh build.
        run: bun run mobile:build:ios
      - name: Boot iOS Simulator
        # The validate-mc*.sh scripts need a booted simulator for
        # `xcrun simctl install booted` and `xcrun simctl spawn booted
        # log stream`. Pick the first available iPhone simulator
        # (whatever iOS version macos-15 ships).
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | awk '/-- iOS /{flag=$0} /iPhone/ && !seen {print; seen=1}' \
            | head -1 \
            | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
          if [ -z "$DEVICE" ]; then
            echo 'FAIL: no iPhone simulator available on this runner'
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
      - name: Run debug-surface validates (validate-mc*.sh)
        # Iterate every `validate-mc*.sh` script present in
        # apps/mobile-client/scripts/. Today that's validate-mc14.sh
        # (MC1.4 hermes-ready log-scrape) and validate-mc23.sh (MC2.3
        # OnlookRuntime installed log-scrape). As later Wave 5 tasks
        # (MC5.8 crash overlay, MC5.10 dev-menu long-press, etc.) land
        # their own log-scrape scripts in this dir, they'll be picked up
        # automatically — no workflow edit required.
        #
        # The loop fails the step on the FIRST failing script (the loop
        # body exits non-zero), matching wave1-ios's explicit-step
        # semantics. `set -e` on the shell does that for us because each
        # script exits 0/non-0.
        #
        # NOTE on the race with MC1.11's wave1-ios: wave1-ios also runs
        # validate-mc14.sh + validate-mc23.sh as discrete steps. That
        # duplication is intentional for now — wave5 is scoped to the
        # debug-surface artifacts (results.json + maestro-debug/) and
        # must produce them even if wave1-ios is skipped or fails early
        # (e.g., when `inputs.phase == 'wave5'`). Once Wave 5 has its own
        # `validate-mc5*.sh` family, this step will iterate those only.
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          scripts=(apps/mobile-client/scripts/validate-mc*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo '[wave5] FAIL: no validate-mc*.sh scripts found'
            exit 1
          fi
          echo "[wave5] running ${#scripts[@]} debug-surface validate(s):"
          printf '  - %s\n' "${scripts[@]}"
          for script in "${scripts[@]}"; do
            echo "::group::$script"
            bash "$script"
            echo '::endgroup::'
          done
      - name: Upload wave-5 debug-surface verification artifacts
        # Always upload even on failure so the log-scrape tails and any
        # maestro-debug dumps are inspectable post-mortem.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave5-debug-verification
          path: |
            apps/mobile-client/verification/results.json
            apps/mobile-client/verification/maestro-debug/
            apps/mobile-client/e2e/flows/*.png
          if-no-files-found: ignore

  # ─── Wave 6: TestFlight / Play dry-run uploads ─────────────────────────

  testflight-dryrun:
    name: Wave 6 — TestFlight dry-run
    runs-on: macos-15
    needs: [guard, wave1-ios]
    if: ${{ needs.guard.outputs.has_eas_json == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/feat/mobile-client' }}
    steps:
      - run: echo "TestFlight dry-run slot — filled by MC6.7 append"

  # ─── Wave 6: TestFlight upload (manual-only, dry-run-by-default) ────────
  #
  # MC6.7 — A dispatch-only job that exercises the `eas build`/`eas submit`
  # invocation contract MC6.5 set up. Two gates keep this from ever running
  # by accident:
  #
  #   (1) Trigger gate — `on.workflow_dispatch` only. Push and pull_request
  #       events never reach this job; the `if:` below also hard-asserts
  #       `github.event_name == 'workflow_dispatch'` as belt-and-braces so an
  #       accidental future `schedule:` trigger addition cannot kick this
  #       off silently.
  #
  #   (2) Secret gate — `secrets.EXPO_TOKEN != ''`. The token is required
  #       by eas-cli for any cloud build or submit. Without it the job is
  #       SKIPPED (green, not failed) so a maintainer running `workflow_dispatch`
  #       on a fork that doesn't carry the secret gets an unambiguous "skipped"
  #       badge rather than a confusing red run. Evaluating a repo secret in
  #       a job-level `if:` requires threading it through `env:` — GitHub
  #       does not expose `secrets.*` inside `if:` directly.
  #
  # The `upload` boolean input controls the MODE, not the gate:
  #   - upload == false (DEFAULT) → `eas build … --dry-run` only. No artifact
  #     is produced and no submit runs. This is the normal "is the config
  #     still valid?" health check a maintainer runs on demand.
  #   - upload == true            → real `eas build` (cloud, non-local) followed
  #     by `eas submit` to TestFlight. Used only when cutting a real release.
  #
  # The `phase` input from MC1.11/MC5.x is respected identically to the other
  # wave jobs so a maintainer can invoke JUST this job with
  #   gh workflow run mobile-client.yml -f phase=testflight-upload -f upload=true
  # without wave1-ios / wave4-ios / wave5 also trying to run on the same
  # dispatch.
  testflight-upload:
    name: Wave 6 — TestFlight upload (dispatch-only)
    runs-on: macos-15
    needs: [guard, typecheck-and-unit]
    # Belt-and-braces: three independent conditions must ALL hold.
    #   a) The eas.json config MC6.5 introduced must exist (guards against
    #      the job running before MC6.5 merges on a branch that somehow
    #      re-ordered the merges).
    #   b) The invocation must be a manual dispatch, and if a specific phase
    #      was named it must be this one (empty phase still runs this job —
    #      matches the other waves' semantics).
    #   c) The EXPO_TOKEN secret must be present. `secrets.EXPO_TOKEN` is
    #      not directly available in `if:` expressions, so we thread it
    #      through an env var (`HAS_EXPO_TOKEN`) set at the job level.
    if: >-
      ${{ needs.guard.outputs.has_eas_json == 'true'
          && github.event_name == 'workflow_dispatch'
          && (inputs.phase == '' || inputs.phase == 'testflight-upload')
          && needs.guard.outputs.has_expo_token == 'true' }}
    env:
      # Populated to the literal string 'true' when the secret is non-empty,
      # empty string otherwise. The `if:` above compares to 'true' so a
      # missing secret (empty string) cleanly evaluates to skip. This pattern
      # is the GitHub-recommended workaround for gating jobs on a secret's
      # presence without leaking the secret value into the condition.
      HAS_EXPO_TOKEN: ${{ secrets.EXPO_TOKEN != '' && 'true' || 'false' }}
      # The token itself is exposed to the eas-cli step only. Keeping it at
      # job-level env means any future step added here picks it up without
      # having to remember to re-export it.
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install workspace deps
        # Full install (no --frozen-lockfile omission here) because eas-cli
        # is a dev-dep in the workspace; the lockfile must match so a future
        # drift fails loudly rather than silently pulling a different cli.
        run: bun install --frozen-lockfile
      - name: EAS build — TestFlight (dry-run or real submit)
        # Branch on the dispatch input:
        #   - inputs.upload == 'true' → cloud build + submit to TestFlight.
        #     `--local=false` forces eas to build on EAS cloud runners
        #     (required for real signing) rather than this macOS runner.
        #     A successful build is followed by `eas submit` which uploads
        #     the .ipa to TestFlight using the submit.preview profile
        #     from eas.json (MC6.5).
        #   - inputs.upload == 'false' (DEFAULT) → `--dry-run` only. EAS
        #     validates the profile and credentials without producing a
        #     build or submitting anything. This is the low-cost health
        #     check path.
        #
        # `bun x eas-cli` invokes the workspace-pinned version; this matches
        # the MC6.5 wrapper script's invocation style so the CI and local
        # dry-runs stay in lockstep.
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo '[testflight-upload] REAL upload requested — running eas build + submit'
            bun x eas-cli build \
              --profile preview \
              --platform ios \
              --non-interactive \
              --local=false
            bun x eas-cli submit \
              --profile preview \
              --platform ios \
              --non-interactive \
              --latest
          else
            echo '[testflight-upload] dry-run (default) — no build, no submit'
            bun x eas-cli build \
              --profile preview \
              --platform ios \
              --non-interactive \
              --dry-run
          fi

  play-dryrun:
    name: Wave 6 — Play internal dry-run
    runs-on: macos-15
    needs: [guard, wave1-android]
    if: ${{ needs.guard.outputs.has_play_internal_script == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/feat/mobile-client' }}
    steps:
      - run: echo "Play dry-run slot — filled by MC6.8 append"

  # ─── Wave 6: Play Store upload (manual-only, dry-run-by-default) ────────
  #
  # MC6.8 — Android mirror of the MC6.7 `testflight-upload` job. Same gating
  # shape (trigger gate + secret gate + `phase`/`upload` inputs), but swapped
  # for Android tooling:
  #
  #   - `runs-on: ubuntu-latest`. Android builds don't need macOS — Gradle +
  #     the Android SDK run happily on Linux and Linux runners are ~10× cheaper
  #     than macOS runners. The real build runs on EAS cloud regardless
  #     (`--local=false` in the upload path), so the host OS here only needs
  #     to host bun + eas-cli for the dry-run/config-validation path.
  #   - `setup-java@v4` with Temurin 17. eas-cli shells out to Gradle during
  #     Android build planning even in `--dry-run` mode; Temurin 17 is the
  #     baseline AGP 8.x requires and matches `wave1-android`.
  #   - `GOOGLE_PLAY_SERVICE_ACCOUNT_KEY` takes the place MC6.7 gives
  #     `EXPO_TOKEN`. The secret is the JSON service-account key used by
  #     `eas submit` to upload the .aab to the Play Console internal track.
  #     Same env-var indirection pattern (`HAS_GOOGLE_PLAY_KEY` set at job
  #     level) because repo secrets can't be compared directly in `if:`.
  #
  # The `upload` boolean input shares semantics with MC6.7:
  #   - upload == false (DEFAULT) → `eas build … --dry-run` only. No artifact,
  #     no submit. Validates the `preview` profile + Android credentials shape.
  #   - upload == true            → real `eas build` (cloud) followed by
  #     `eas submit` to the Play internal track (submit.preview.android from
  #     eas.json).
  #
  # Invocation examples:
  #   gh workflow run mobile-client.yml -f phase=play-store-upload             # dry-run
  #   gh workflow run mobile-client.yml -f phase=play-store-upload -f upload=true
  play-store-upload:
    name: Wave 6 — Play Store upload (dispatch-only)
    runs-on: ubuntu-latest
    needs: [guard, typecheck-and-unit]
    # Belt-and-braces: three independent conditions must ALL hold.
    #   a) The eas.json config MC6.5 introduced must exist.
    #   b) The invocation must be a manual dispatch, and if a specific phase
    #      was named it must be this one.
    #   c) The GOOGLE_PLAY_SERVICE_ACCOUNT_KEY secret must be present (threaded
    #      through `env.HAS_GOOGLE_PLAY_KEY` because repo secrets are not
    #      available directly inside `if:` expressions).
    if: >-
      ${{ needs.guard.outputs.has_eas_json == 'true'
          && github.event_name == 'workflow_dispatch'
          && (inputs.phase == '' || inputs.phase == 'play-store-upload')
          && needs.guard.outputs.has_google_play_key == 'true' }}
    env:
      # 'true' iff the secret is non-empty; empty string otherwise. Matches
      # the MC6.7 HAS_EXPO_TOKEN pattern exactly.
      HAS_GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY != '' && 'true' || 'false' }}
      # The service-account JSON is exposed to the eas-cli step only. eas
      # submit reads the key path from submit.preview.android.serviceAccountKeyPath
      # in eas.json; we materialise the secret to that path below.
      GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
      # EXPO_TOKEN is still required by eas-cli for any cloud build/submit.
      # If absent, the `upload == true` branch will fail fast; the default
      # dry-run branch does not need it.
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install workspace deps
        # --frozen-lockfile so any drift in eas-cli version is caught loudly
        # rather than silently pulling a different cli (mirrors MC6.7).
        run: bun install --frozen-lockfile
      - name: EAS build — Play Store (dry-run or real submit)
        # Branch on the dispatch input:
        #   - inputs.upload == 'true'  → cloud build + submit to Play internal.
        #     `--local=false` forces eas to build on EAS cloud runners (needed
        #     for signed-release .aab). A successful build is followed by
        #     `eas submit` which uploads the .aab using submit.preview.android
        #     from eas.json (MC6.5).
        #   - inputs.upload == 'false' (DEFAULT) → `--dry-run` only. EAS
        #     validates the profile + credentials shape without producing a
        #     build or submitting anything. This is the low-cost health check.
        #
        # `bun x eas-cli` invokes the workspace-pinned version to match the
        # MC6.5 wrapper script invocation style so CI and local dry-runs stay
        # in lockstep.
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.upload }}" = "true" ]; then
            echo '[play-store-upload] REAL upload requested — running eas build + submit'
            bun x eas-cli build \
              --profile preview \
              --platform android \
              --non-interactive \
              --local=false
            bun x eas-cli submit \
              --profile preview \
              --platform android \
              --non-interactive \
              --latest
          else
            echo '[play-store-upload] dry-run (default) — no build, no submit'
            bun x eas-cli build \
              --profile preview \
              --platform android \
              --non-interactive \
              --dry-run
          fi

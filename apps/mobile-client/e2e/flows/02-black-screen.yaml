# 02-black-screen.yaml — Wave 1 task MC1.3 of plans/onlook-mobile-client-task-queue.md.
#
# Historically this flow asserted the app launched to a *black* screen —
# i.e. the root view controller was mounted but no UI rendered, because
# the app was a bare scaffold. As of 2026-04-16 LauncherScreen is wired
# into App.tsx (MC3.20), so the "black screen" assertion no longer
# matches reality. We now assert:
#   1. LauncherScreen's "Onlook" header is visible (RN root mounted,
#      React rendered, no red-box).
#   2. No common red-box error strings are on screen.
#
# The file is preserved (rather than deleted) so validate-task.ts wrappers
# that reference MC1.3 by flow filename continue to resolve; the check
# has just been upgraded from "absence of errors on an empty view" to
# "presence of launcher chrome + absence of errors".

appId: com.onlook.mobile
---
- launchApp:
    clearState: true
- assertVisible:
    text: "Onlook"
    timeout: 8000
- assertNotVisible: "Error"
- assertNotVisible: "Unable to load"
- assertNotVisible: "RCTFatal"

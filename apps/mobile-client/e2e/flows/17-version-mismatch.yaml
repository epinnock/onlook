# 17-version-mismatch.yaml — Wave 3 task MC3.15 of plans/onlook-mobile-client-task-queue.md.
#
# Asserts the version mismatch screen renders its key affordances:
#   1. "Version Mismatch" heading
#   2. Descriptive message mentioning version incompatibility
#   3. "Retry" action button
#   4. "Go back" action button
#
# NOTE: This flow will timeout on the bare-scaffold app because App.tsx
# doesn't yet route to VersionMismatchScreen. The wiring lands in MC3.20
# (app router). The flow file is authored now so validate-task.ts can
# locate it and the maestro YAML is ready when the router is in place.

appId: com.onlook.mobile
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: "Version Mismatch"
- assertVisible: "Retry"
- assertVisible: "Go back"
